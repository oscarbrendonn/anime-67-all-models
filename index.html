<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anime 67 Character Models</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: #15191f;
        --panel-2: #1d232b;
        --panel-3: #252d37;
        --text: #f5f7fa;
        --muted: #a8b3bf;
        --line: #35404c;
        --accent: #e8f05f;
        --accent-text: #171904;
        --blue: #72c7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      a {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        min-height: 68px;
        border-bottom: 1px solid var(--line);
        background: rgba(21, 25, 31, 0.98);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .link-button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 12px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
      }

      .workspace {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
      }

      .library {
        min-height: 0;
        border-right: 1px solid var(--line);
        background: var(--panel);
        display: grid;
        grid-template-rows: auto auto auto 1fr;
      }

      .library-head {
        padding: 14px;
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 10px;
      }

      .slot-tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .slot-tab,
      .filter-tab,
      .assign-button,
      .model-main {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
      }

      .slot-tab {
        min-height: 38px;
        font-size: 13px;
        font-weight: 800;
      }

      .slot-tab.active,
      .filter-tab.active {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--accent-text);
      }

      .search {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f1216;
        color: var(--text);
        padding: 9px 11px;
        outline: none;
      }

      .filters {
        border-bottom: 1px solid var(--line);
        padding: 12px 14px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }

      .filter-tab {
        min-height: 34px;
        padding: 7px 10px;
        white-space: nowrap;
        font-size: 12px;
        font-weight: 800;
      }

      .library-meta {
        min-height: 38px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 14px;
        font-size: 12px;
      }

      .model-list {
        min-height: 0;
        overflow: auto;
        padding: 10px;
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .model-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(29, 35, 43, 0.86);
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 8px;
      }

      .model-row.loaded {
        border-color: rgba(232, 240, 95, 0.78);
      }

      .model-main {
        min-height: 50px;
        padding: 7px 8px;
        text-align: left;
        display: grid;
        gap: 4px;
      }

      .model-main strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .model-main span {
        color: var(--muted);
        font-size: 11px;
      }

      .assigns {
        display: grid;
        grid-template-columns: repeat(3, 32px);
        gap: 5px;
        align-content: center;
      }

      .assign-button {
        width: 32px;
        height: 32px;
        font-size: 12px;
        font-weight: 900;
      }

      .assign-button.active {
        border-color: var(--blue);
        color: var(--blue);
      }

      .stage {
        min-width: 0;
        min-height: 0;
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(3, minmax(240px, 1fr));
        gap: 14px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          #101419;
        background-size: 44px 44px;
      }

      .slot-card {
        min-width: 0;
        min-height: calc(100vh - 96px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(21, 25, 31, 0.92);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(460px, 1fr) auto;
      }

      .slot-head {
        min-height: 78px;
        border-bottom: 1px solid var(--line);
        padding: 12px;
        display: grid;
        gap: 6px;
      }

      .slot-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .slot-title strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 15px;
      }

      .slot-number {
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--panel-3);
        color: var(--muted);
        padding: 5px 8px;
        font-size: 11px;
        font-weight: 900;
      }

      .slot-details {
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        min-height: 460px;
        background: #101419;
        --poster-color: transparent;
      }

      .slot-foot {
        min-height: 50px;
        border-top: 1px solid var(--line);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .status {
        min-width: 0;
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        padding: 7px 10px;
        text-decoration: none;
        font-size: 12px;
        font-weight: 900;
      }

      @media (max-width: 1240px) {
        .workspace {
          grid-template-columns: 320px minmax(0, 1fr);
        }

        .stage {
          grid-template-columns: 1fr;
        }

        .slot-card {
          min-height: 640px;
        }
      }

      @media (max-width: 820px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .top-actions,
        .link-button {
          width: 100%;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .library {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 560px;
        }

        .stage {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <h1>Anime 67 Character Models</h1>
          <span class="count" id="model-count">18 model</span>
        </div>
        <div class="top-actions">
          <a class="link-button" href="https://github.com/oscarbrendonn/anime-67-all-models">GitHub</a>
          <a class="link-button" href="https://github.com/oscarbrendonn/anime-67-all-models/archive/refs/heads/main.zip">ZIP</a>
        </div>
      </header>

      <section class="workspace">
        <aside class="library">
          <div class="library-head">
            <div class="slot-tabs" aria-label="Aktif slot">
              <button class="slot-tab active" type="button" data-slot-tab="0">Slot 1</button>
              <button class="slot-tab" type="button" data-slot-tab="1">Slot 2</button>
              <button class="slot-tab" type="button" data-slot-tab="2">Slot 3</button>
            </div>
            <input class="search" id="search" type="search" placeholder="Model ara">
          </div>

          <div class="filters" id="filters"></div>
          <div class="library-meta">
            <span id="shown-count">33 gorunur</span>
            <span id="active-slot">Aktif: Slot 1</span>
          </div>
          <div class="model-list" id="model-list"></div>
        </aside>

        <section class="stage" aria-label="Kiyas slotlari">
          <article class="slot-card" data-slot-card="0">
            <div class="slot-head">
              <div class="slot-title">
                <strong id="slot-name-0"></strong>
                <span class="slot-number">Slot 1</span>
              </div>
              <span class="slot-details" id="slot-details-0"></span>
            </div>
            <model-viewer id="viewer-0" camera-controls auto-rotate auto-rotate-delay="0" shadow-intensity="0.8" exposure="1" environment-image="neutral" camera-orbit="0deg 75deg 3.2m" min-camera-orbit="auto auto 1.4m" max-camera-orbit="auto auto 8m"></model-viewer>
            <div class="slot-foot">
              <span class="status" id="status-0">Yukleniyor...</span>
              <a class="download" id="download-0" download>GLB indir</a>
            </div>
          </article>

          <article class="slot-card" data-slot-card="1">
            <div class="slot-head">
              <div class="slot-title">
                <strong id="slot-name-1"></strong>
                <span class="slot-number">Slot 2</span>
              </div>
              <span class="slot-details" id="slot-details-1"></span>
            </div>
            <model-viewer id="viewer-1" camera-controls auto-rotate auto-rotate-delay="0" shadow-intensity="0.8" exposure="1" environment-image="neutral" camera-orbit="0deg 75deg 3.2m" min-camera-orbit="auto auto 1.4m" max-camera-orbit="auto auto 8m"></model-viewer>
            <div class="slot-foot">
              <span class="status" id="status-1">Yukleniyor...</span>
              <a class="download" id="download-1" download>GLB indir</a>
            </div>
          </article>

          <article class="slot-card" data-slot-card="2">
            <div class="slot-head">
              <div class="slot-title">
                <strong id="slot-name-2"></strong>
                <span class="slot-number">Slot 3</span>
              </div>
              <span class="slot-details" id="slot-details-2"></span>
            </div>
            <model-viewer id="viewer-2" camera-controls auto-rotate auto-rotate-delay="0" shadow-intensity="0.8" exposure="1" environment-image="neutral" camera-orbit="0deg 75deg 3.2m" min-camera-orbit="auto auto 1.4m" max-camera-orbit="auto auto 8m"></model-viewer>
            <div class="slot-foot">
              <span class="status" id="status-2">Yukleniyor...</span>
              <a class="download" id="download-2" download>GLB indir</a>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script>
      const models = [
        { name: "KARAKTER 4K v1", file: "KARAKTER_4K_v1.glb", group: "Karakter", size: "22M" },
        { name: "KARAKTER 4K v1 back clean", file: "KARAKTER_4K_v1_BACK_CLEAN.glb", group: "Temiz", size: "35M" },
        { name: "KARAKTER 4K v1 back flat", file: "KARAKTER_4K_v1_BACK_FLAT.glb", group: "Temiz", size: "33M" },
        { name: "KARAKTER 4K v1 back flat neck clean", file: "KARAKTER_4K_v1_BACK_FLAT_NECK_CLEAN.glb", group: "Temiz", size: "33M" },
        { name: "KARAKTER 4K v2", file: "KARAKTER_4K_v2.glb", group: "Karakter", size: "22M" },
        { name: "KARAKTER 4K v3", file: "KARAKTER_4K_v3.glb", group: "Karakter", size: "22M" },
        { name: "KARAKTER 4K v4", file: "KARAKTER_4K_v4.glb", group: "Karakter", size: "22M" },
        { name: "KARAKTER 4K v5", file: "KARAKTER_4K_v5.glb", group: "Karakter", size: "21M" },
        { name: "KARAKTER 4K v6", file: "KARAKTER_4K_v6.glb", group: "Karakter", size: "22M" },
        { name: "KARAKTER 4K v7", file: "KARAKTER_4K_v7.glb", group: "Karakter", size: "22M" },
        { name: "KARAKTER 4K v7 back clean", file: "KARAKTER_4K_v7_BACK_CLEAN.glb", group: "Temiz", size: "35M" },
        { name: "KARAKTER 4K v7 back flat", file: "KARAKTER_4K_v7_BACK_FLAT.glb", group: "Temiz", size: "33M" },
        { name: "KARAKTER 4K v8", file: "KARAKTER_4K_v8.glb", group: "Karakter", size: "22M" },
        { name: "KARAKTER 4K v8 back clean", file: "KARAKTER_4K_v8_BACK_CLEAN.glb", group: "Temiz", size: "35M" },
        { name: "KARAKTER 4K v8 back flat", file: "KARAKTER_4K_v8_BACK_FLAT.glb", group: "Temiz", size: "33M" },
        { name: "KARAKTER 4K v9", file: "KARAKTER_4K_v9.glb", group: "Karakter", size: "21M" },
        { name: "KARAKTER 4K v9 back clean", file: "KARAKTER_4K_v9_BACK_CLEAN.glb", group: "Temiz", size: "34M" },
        { name: "KARAKTER 4K v9 back flat", file: "KARAKTER_4K_v9_BACK_FLAT.glb", group: "Temiz", size: "32M" },
      ].map((model) => ({ ...model, path: `models/${model.file}` }));

      const groups = ["Hepsi", "Karakter", "Temiz"];
      const slots = [
        models.find((model) => model.file === "KARAKTER_4K_v7_BACK_FLAT.glb"),
        models.find((model) => model.file === "KARAKTER_4K_v8_BACK_FLAT.glb"),
        models.find((model) => model.file === "KARAKTER_4K_v9_BACK_FLAT.glb")
      ];
      let activeSlot = 0;
      let activeGroup = "Hepsi";
      let query = "";

      const filtersEl = document.querySelector("#filters");
      const listEl = document.querySelector("#model-list");
      const searchEl = document.querySelector("#search");
      const shownCountEl = document.querySelector("#shown-count");
      const activeSlotEl = document.querySelector("#active-slot");
      const modelCountEl = document.querySelector("#model-count");

      modelCountEl.textContent = `${models.length} model`;

      function isVisible(model) {
        const inGroup = activeGroup === "Hepsi" || model.group === activeGroup;
        const text = `${model.name} ${model.file} ${model.group}`.toLowerCase();
        return inGroup && text.includes(query.toLowerCase().trim());
      }

      function renderFilters() {
        filtersEl.replaceChildren();
        groups.forEach((group) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `filter-tab${group === activeGroup ? " active" : ""}`;
          button.textContent = group;
          button.addEventListener("click", () => {
            activeGroup = group;
            renderFilters();
            renderLibrary();
          });
          filtersEl.appendChild(button);
        });
      }

      function renderSlotTabs() {
        document.querySelectorAll("[data-slot-tab]").forEach((button) => {
          const slot = Number(button.dataset.slotTab);
          button.classList.toggle("active", slot === activeSlot);
        });
        activeSlotEl.textContent = `Aktif: Slot ${activeSlot + 1}`;
      }

      function setSlot(slot, model) {
        activeSlot = slot;
        slots[slot] = model;
        renderSlot(slot);
        renderSlotTabs();
        renderLibrary();
      }

      function renderSlot(slot) {
        const model = slots[slot];
        const viewer = document.querySelector(`#viewer-${slot}`);
        const name = document.querySelector(`#slot-name-${slot}`);
        const details = document.querySelector(`#slot-details-${slot}`);
        const status = document.querySelector(`#status-${slot}`);
        const download = document.querySelector(`#download-${slot}`);

        name.textContent = model.name;
        details.textContent = `${model.group} / ${model.size} / ${model.file}`;
        status.textContent = "Yukleniyor...";
        download.href = model.path;
        download.setAttribute("download", model.file);

        if (viewer.getAttribute("src") !== model.path) {
          viewer.setAttribute("src", model.path);
        }
      }

      function renderLibrary() {
        const visible = models.filter(isVisible);
        shownCountEl.textContent = `${visible.length} gorunur`;
        listEl.replaceChildren();

        visible.forEach((model) => {
          const row = document.createElement("div");
          row.className = `model-row${slots.some((slotModel) => slotModel.file === model.file) ? " loaded" : ""}`;

          const main = document.createElement("button");
          main.type = "button";
          main.className = "model-main";
          main.innerHTML = `<strong>${model.name}</strong><span>${model.group} / ${model.size}</span>`;
          main.addEventListener("click", () => setSlot(activeSlot, model));

          const assigns = document.createElement("div");
          assigns.className = "assigns";
          [0, 1, 2].forEach((slot) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `assign-button${slots[slot].file === model.file ? " active" : ""}`;
            button.textContent = String(slot + 1);
            button.addEventListener("click", () => setSlot(slot, model));
            assigns.appendChild(button);
          });

          row.append(main, assigns);
          listEl.appendChild(row);
        });
      }

      searchEl.addEventListener("input", (event) => {
        query = event.target.value;
        renderLibrary();
      });

      document.querySelectorAll("[data-slot-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          activeSlot = Number(button.dataset.slotTab);
          renderSlotTabs();
          renderLibrary();
        });
      });

      document.querySelectorAll("model-viewer").forEach((viewer, slot) => {
        viewer.addEventListener("load", () => {
          document.querySelector(`#status-${slot}`).textContent = "Hazir";
        });

        viewer.addEventListener("error", () => {
          document.querySelector(`#status-${slot}`).textContent = "Yuklenemedi";
        });
      });

      renderFilters();
      renderSlotTabs();
      [0, 1, 2].forEach(renderSlot);
      renderLibrary();
    </script>
  </body>
</html>
