<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anime 67 Character Models</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: #15191f;
        --panel-2: #1d232b;
        --text: #f5f7fa;
        --muted: #a8b3bf;
        --line: #35404c;
        --accent: #e8f05f;
        --accent-text: #171904;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          var(--bg);
        background-size: 44px 44px;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .topbar {
        min-height: 70px;
        border-bottom: 1px solid var(--line);
        background: rgba(21, 25, 31, 0.96);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .title {
        min-width: 0;
        display: grid;
        gap: 4px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .subtitle {
        color: var(--muted);
        font-size: 13px;
      }

      .repo-link {
        flex: 0 0 auto;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 12px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
      }

      .grid {
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(3, minmax(260px, 1fr));
        gap: 14px;
      }

      .card {
        min-width: 0;
        min-height: calc((100vh - 110px) / 2);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(21, 25, 31, 0.92);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(420px, 1fr) auto;
      }

      .card-head {
        min-height: 64px;
        border-bottom: 1px solid var(--line);
        padding: 11px 12px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .name {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .name strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 15px;
      }

      .name span {
        color: var(--muted);
        font-size: 12px;
      }

      .badge {
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--accent);
        color: var(--accent-text);
        padding: 5px 8px;
        font-size: 11px;
        font-weight: 900;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        min-height: 420px;
        background: #101419;
        --poster-color: transparent;
      }

      .card-foot {
        min-height: 48px;
        border-top: 1px solid var(--line);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .status {
        min-width: 0;
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        padding: 7px 10px;
        text-decoration: none;
        font-size: 12px;
        font-weight: 900;
      }

      @media (max-width: 1180px) {
        .grid {
          grid-template-columns: repeat(2, minmax(260px, 1fr));
        }
      }

      @media (max-width: 720px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .repo-link {
          width: 100%;
        }

        .grid {
          grid-template-columns: 1fr;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="title">
        <h1>Anime 67 Character Models</h1>
        <span class="subtitle">15 tam karakter + 2 diz split parca. En yeni 6 aday en ustte; hepsi acik, hepsi dondurulebilir.</span>
      </div>
      <a class="repo-link" href="https://github.com/oscarbrendonn/anime-67-all-models">GitHub</a>
    </header>

    <main class="grid" aria-label="Karakter modelleri"></main>

    <script>
      const models = [
        ["Aday V32", "Yeni ekstra uc: back temiz, yuz odakli", "models/KARAKTER_4K_v32_BACK_TEMIZ.glb", "YENI"],
        ["Aday V33", "Yeni ekstra uc: back temiz, en dengeli aday", "models/KARAKTER_4K_v33_BACK_TEMIZ.glb", "YENI"],
        ["Aday V34", "Yeni ekstra uc: back temiz, yuz odakli", "models/KARAKTER_4K_v34_BACK_TEMIZ.glb", "YENI"],
        ["Aday V29", "Onceki uc: yuz odakli", "models/KARAKTER_4K_v29.glb", "ESKI 3"],
        ["Aday V30", "Onceki uc: back temiz", "models/KARAKTER_4K_v30_BACK_TEMIZ.glb", "ESKI 3"],
        ["Aday V31", "Onceki uc: yuz odakli", "models/KARAKTER_4K_v31.glb", "ESKI 3"],
        ["Karakter V5", "Back flat temiz", "models/KARAKTER_4K_v5_BACK_FLAT.glb", ""],
        ["Karakter V6", "Back flat temiz", "models/KARAKTER_4K_v6_BACK_FLAT.glb", ""],
        ["Karakter V7", "Back flat temiz", "models/KARAKTER_4K_v7_BACK_FLAT.glb", ""],
        ["Karakter V8", "Back flat temiz", "models/KARAKTER_4K_v8_BACK_FLAT.glb", ""],
        ["Karakter V9", "Back flat temiz", "models/KARAKTER_4K_v9_BACK_FLAT.glb", ""],
        ["Karakter V10", "Yeni uretim, back flat temiz", "models/KARAKTER_4K_v10_BACK_FLAT.glb", "NEW"],
        ["Karakter V11", "Yeni 4K tam karakter", "models/KARAKTER_4K_v11.glb", "NEW"],
        ["Karakter V12", "Yeni 4K tam karakter", "models/KARAKTER_4K_v12.glb", "NEW"],
        ["Karakter V13", "Yeni 4K tam karakter", "models/KARAKTER_4K_v13.glb", "NEW"],
        ["Diz Split Ust V2", "On + arka crop, diz altindan kesim", "models/KARAKTER_SPLIT_UST_DIZ_v2.glb", "SPLIT"],
        ["Diz Split Alt V2", "On + arka crop, alt bacak ve ayakkabi", "models/KARAKTER_SPLIT_ALT_DIZ_v2.glb", "SPLIT"],
      ];

      const grid = document.querySelector(".grid");

      models.forEach(([name, note, src, badge]) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-head">
            <div class="name">
              <strong></strong>
              <span></span>
            </div>
            ${badge ? '<span class="badge"></span>' : ''}
          </div>
          <model-viewer camera-controls auto-rotate auto-rotate-delay="0" shadow-intensity="0.8" exposure="1" environment-image="neutral" camera-orbit="0deg 75deg 3.2m" min-camera-orbit="auto auto 1.4m" max-camera-orbit="auto auto 8m"></model-viewer>
          <div class="card-foot">
            <span class="status">Yukleniyor...</span>
            <a class="download" download>GLB indir</a>
          </div>
        `;
        card.querySelector("strong").textContent = name;
        card.querySelector(".name span").textContent = note;
        if (badge) card.querySelector(".badge").textContent = badge;
        const viewer = card.querySelector("model-viewer");
        viewer.setAttribute("src", src);
        const download = card.querySelector(".download");
        download.href = src;
        grid.appendChild(card);
      });

      document.querySelectorAll("model-viewer").forEach((viewer) => {
        const status = viewer.closest(".card").querySelector(".status");

        viewer.addEventListener("load", () => {
          status.textContent = "Hazir";
        });

        viewer.addEventListener("error", () => {
          status.textContent = "Yuklenemedi";
        });
      });
    </script>
  </body>
</html>
